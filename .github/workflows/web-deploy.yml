name: CI / Deploy Web

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

  check-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

  build-preview:
    needs: [check, check-worker]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build:web
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL_DEV }}
          EXPO_PUBLIC_CONVEX_SITE_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_SITE_URL_DEV }}
          EXPO_PUBLIC_IMPORT_WORKER_URL: ${{ secrets.EXPO_PUBLIC_IMPORT_WORKER_URL_DEV }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-preview
          path: dist/
          retention-days: 1

  build-production:
    needs: [check, check-worker]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build:web
        env:
          EXPO_PUBLIC_CONVEX_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_URL_PROD }}
          EXPO_PUBLIC_CONVEX_SITE_URL: ${{ secrets.EXPO_PUBLIC_CONVEX_SITE_URL_PROD }}
          EXPO_PUBLIC_IMPORT_WORKER_URL: ${{ secrets.EXPO_PUBLIC_IMPORT_WORKER_URL_PROD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-production
          path: dist/
          retention-days: 1

  deploy-preview:
    needs: build-preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-preview
          path: dist/

      - name: Deploy preview
        run: npx eas-cli deploy --environment preview --alias dev
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  deploy-production:
    needs: deploy-preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-production
          path: dist/

      - name: Deploy production
        run: npx eas-cli deploy --prod --environment production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
